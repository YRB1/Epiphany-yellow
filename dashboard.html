<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Staff Dashboard — Epiphany Foster Care</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --purple:#78350F; --purple-d:#431407; --gold:#F59E0B;
  --teal:#0F766E; --coral:#E85D4A; --cream:#FFFBEB; --bg:#F4F3F8;
}
#cursor{position:fixed;pointer-events:none;z-index:100000;width:40px;height:40px;border-radius:50%;border:1.5px solid rgba(245,158,11,.65);transform:translate(-50%,-50%);transition:width .25s,height .25s,border-color .25s,background .25s;will-change:left,top;mix-blend-mode:difference}
#cursor-dot{position:fixed;pointer-events:none;z-index:100001;width:5px;height:5px;border-radius:50%;background:var(--gold);transform:translate(-50%,-50%);will-change:left,top}
body.cursor-link #cursor{width:52px;height:52px;background:rgba(245,158,11,.14);border-color:rgba(245,158,11,.9)}
@media(hover:none){#cursor,#cursor-dot{display:none}body{cursor:auto}}
@media(hover:hover){body{cursor:none}a,button,[role=button]{cursor:none}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;color:#1f2937;background:var(--bg)}
a{color:inherit}
.serif{font-family:'Playfair Display',serif}

/* ── LAYOUT ─────────────────────────────── */
.app{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:256px;background:var(--purple-d);color:#fff;position:fixed;top:0;bottom:0;left:0;
  display:flex;flex-direction:column;z-index:40;transition:transform .25s}
.sb-brand{display:flex;align-items:center;gap:.7rem;padding:1.3rem 1.4rem;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-brand .star{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center}
.sb-brand .bn{font-weight:700;font-size:.92rem;line-height:1.15}
.sb-brand .bs{font-size:.64rem;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.8px}
.sb-nav{flex:1;padding:1rem .8rem;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:.8rem;padding:.7rem .85rem;border-radius:10px;
  cursor:pointer;color:rgba(255,255,255,.7);font-weight:500;font-size:.9rem;margin-bottom:.2rem;
  transition:.18s;position:relative}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:linear-gradient(90deg,rgba(245,158,11,.22),rgba(245,158,11,.05));color:#fff}
.nav-item.active::before{content:"";position:absolute;left:0;top:18%;bottom:18%;width:3px;border-radius:3px;background:var(--gold)}
.nav-item svg{width:18px;height:18px;flex:none}
.nav-badge{margin-left:auto;background:var(--coral);color:#fff;font-size:.68rem;font-weight:700;
  min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 .35rem}
.sb-user{padding:1rem;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:.7rem}
.sb-user .av{width:38px;height:38px;border-radius:50%;background:var(--gold);color:var(--purple-d);
  display:flex;align-items:center;justify-content:center;font-weight:700;overflow:hidden;flex:none}
.sb-user .av img{width:100%;height:100%;object-fit:cover}
.sb-user .un{font-weight:600;font-size:.82rem;line-height:1.2}
.sb-user .ur{font-size:.68rem;color:rgba(255,255,255,.5)}
.sb-user .logout{margin-left:auto;background:none;border:none;color:rgba(255,255,255,.55);cursor:pointer;padding:.3rem}
.sb-user .logout:hover{color:var(--coral)}

/* Main */
.main{flex:1;margin-left:256px;display:flex;flex-direction:column;min-width:0}
.topbar{height:64px;background:#fff;border-bottom:1px solid #e9e7f0;position:sticky;top:0;z-index:30;
  display:flex;align-items:center;padding:0 1.75rem;gap:1rem}
.topbar .hamb{display:none;background:none;border:none;cursor:pointer}
.topbar h1{font-size:1.15rem;font-weight:700;color:var(--purple-d)}
.topbar .right{margin-left:auto;display:flex;align-items:center;gap:1.1rem}
.bell{position:relative;background:none;border:none;cursor:pointer;color:#6b7280;padding:.3rem}
.bell:hover{color:var(--purple)}
.bell .dot{position:absolute;top:-2px;right:-2px;background:var(--coral);color:#fff;font-size:.6rem;
  font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 .25rem}
.chip-user{display:flex;align-items:center;gap:.55rem;font-size:.85rem;font-weight:600;color:#374151}
.chip-user .av{width:30px;height:30px;border-radius:50%;background:var(--purple);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:.78rem;overflow:hidden}
.chip-user .av img{width:100%;height:100%;object-fit:cover}
.topdate{font-size:.8rem;color:#9ca3af}

.bell-dd{position:absolute;top:54px;right:1.5rem;width:300px;background:#fff;border:1px solid #e9e7f0;
  border-radius:14px;box-shadow:0 18px 44px rgba(26,15,64,.18);z-index:50;overflow:hidden;display:none}
.bell-dd.show{display:block}
.bell-dd .bh{padding:.8rem 1rem;font-weight:700;font-size:.85rem;border-bottom:1px solid #f0eef6;color:var(--purple-d)}
.bell-dd .bi{padding:.7rem 1rem;border-bottom:1px solid #f5f4fa;font-size:.82rem;cursor:pointer}
.bell-dd .bi:hover{background:var(--cream)}
.bell-dd .bi small{color:#9ca3af}
.bell-dd .empty{padding:1.2rem;text-align:center;color:#9ca3af;font-size:.82rem}

.content{padding:28px;flex:1}
.panel{display:none}
.panel.active{display:block;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* Cards & shared */
.card{background:#fff;border:1px solid #ece9f4;border-radius:16px;box-shadow:0 2px 10px rgba(26,15,64,.04)}
.section-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.section-h h2{font-size:1.05rem;font-weight:700;color:var(--purple-d)}
.link{color:var(--purple);font-weight:600;font-size:.82rem;cursor:pointer;text-decoration:none}
.link:hover{text-decoration:underline}
.grid{display:grid;gap:1.1rem}

.badge{display:inline-flex;align-items:center;padding:.22rem .6rem;border-radius:30px;font-size:.7rem;font-weight:700;color:#fff}
.tag{display:inline-flex;align-items:center;padding:.2rem .55rem;border-radius:7px;font-size:.68rem;font-weight:600;color:#fff;margin:.12rem}
.status{display:inline-flex;align-items:center;gap:.35rem;padding:.22rem .6rem;border-radius:30px;font-size:.7rem;font-weight:700}
.status::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.st-new{background:#fef3c7;color:#b45309}
.st-contacted{background:#dbeafe;color:#1d4ed8}
.st-in_progress{background:#e0e7ff;color:#4338ca}
.st-resolved{background:#dcfce7;color:#15803d}

.btn{display:inline-flex;align-items:center;gap:.45rem;padding:.6rem 1rem;border-radius:10px;border:none;
  cursor:pointer;font-family:inherit;font-weight:600;font-size:.85rem;transition:.18s}
.btn-primary{background:var(--gold);color:#1f1300;box-shadow:0 4px 14px rgba(245,158,11,.3)}
.btn-primary:hover{background:#D97706}
.btn-purple{background:var(--purple);color:#fff}
.btn-purple:hover{background:#3a2585}
.btn-ghost{background:#fff;border:1.5px solid #e5e7eb;color:#374151}
.btn-ghost:hover{border-color:var(--purple);color:var(--purple)}
.btn-sm{padding:.4rem .7rem;font-size:.78rem}

input,select,textarea{font-family:inherit;font-size:.88rem}
.inp{width:100%;padding:.6rem .8rem;border:1.5px solid #e5e7eb;border-radius:10px;background:#fff;transition:.18s}
.inp:focus{outline:none;border-color:var(--purple);box-shadow:0 0 0 3px rgba(120,53,15,.1)}

/* Stat cards */
.stats{grid-template-columns:repeat(4,1fr)}
.stat{padding:1.2rem 1.3rem}
.stat .lbl{font-size:.76rem;color:#8b8a96;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.stat .num{font-size:2rem;font-weight:700;margin-top:.3rem;color:var(--purple-d);font-family:'Playfair Display',serif}
.stat .ic{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:.7rem;color:#fff}

/* Welcome card */
.welcome{background:linear-gradient(120deg,var(--purple-d),var(--purple));color:#fff;padding:1.6rem 1.8rem;
  border-radius:18px;margin-bottom:1.4rem;position:relative;overflow:hidden}
.welcome::after{content:"";position:absolute;right:-40px;top:-40px;width:200px;height:200px;
  background:radial-gradient(circle,rgba(245,158,11,.25),transparent 70%)}
.welcome h2{font-size:1.7rem;position:relative;z-index:1}
.welcome p{color:rgba(255,255,255,.7);margin-top:.3rem;position:relative;z-index:1}

/* Table */
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:.7rem .9rem;color:#8b8a96;font-weight:600;font-size:.72rem;
  text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #f0eef6}
td{padding:.75rem .9rem;border-bottom:1px solid #f5f4fa}
tr.clickable{cursor:pointer}
tr.clickable:hover{background:var(--cream)}

/* Avatars */
.av-c{width:30px;height:30px;border-radius:50%;background:var(--purple);color:#fff;display:inline-flex;
  align-items:center;justify-content:center;font-size:.72rem;font-weight:700;overflow:hidden;flex:none}
.av-c img{width:100%;height:100%;object-fit:cover}
.av-stack{display:flex}
.av-stack .av-c{border:2px solid #fff;margin-left:-8px}
.av-stack .av-c:first-child{margin-left:0}

/* Chips/filters */
.chips{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:.9rem}
.chip{padding:.4rem .85rem;border-radius:30px;border:1.5px solid #e5e7eb;background:#fff;cursor:pointer;
  font-size:.8rem;font-weight:600;color:#6b7280;transition:.15s}
.chip:hover{border-color:var(--purple)}
.chip.on{background:var(--purple);color:#fff;border-color:var(--purple)}

/* Drawer */
.overlay{position:fixed;inset:0;background:rgba(26,15,64,.4);z-index:60;opacity:0;pointer-events:none;transition:.25s}
.overlay.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:440px;max-width:92vw;background:#fff;z-index:70;
  transform:translateX(100%);transition:transform .3s;overflow-y:auto;box-shadow:-12px 0 40px rgba(26,15,64,.2)}
.drawer.show{transform:none}
.drawer-h{padding:1.3rem 1.5rem;border-bottom:1px solid #f0eef6;display:flex;align-items:flex-start;justify-content:space-between}
.drawer-b{padding:1.3rem 1.5rem}
.close-x{background:none;border:none;cursor:pointer;color:#9ca3af;padding:.3rem}
.close-x:hover{color:var(--coral)}
.detail-row{display:flex;justify-content:space-between;padding:.55rem 0;border-bottom:1px solid #f5f4fa;font-size:.85rem}
.detail-row .k{color:#8b8a96}
.detail-row .v{font-weight:600;text-align:right}

/* Modal */
.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:80;padding:1rem}
.modal.show{display:flex}
.modal-bg{position:absolute;inset:0;background:rgba(26,15,64,.45)}
.modal-box{position:relative;background:#fff;border-radius:18px;width:540px;max-width:100%;max-height:90vh;
  overflow-y:auto;box-shadow:0 24px 60px rgba(26,15,64,.3);animation:pop .25s ease}
@keyframes pop{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:none}}
.modal-h{padding:1.3rem 1.5rem;border-bottom:1px solid #f0eef6;display:flex;align-items:center;justify-content:space-between}
.modal-h h3{font-size:1.15rem;color:var(--purple-d)}
.modal-b{padding:1.4rem 1.5rem}
.modal-f{padding:1rem 1.5rem;border-top:1px solid #f0eef6;display:flex;justify-content:flex-end;gap:.6rem}
.fl{margin-bottom:1rem}
.fl label{display:block;font-size:.78rem;font-weight:600;color:#374151;margin-bottom:.35rem}
.notes-list{margin-top:.8rem}
.note{background:var(--cream);border-radius:10px;padding:.65rem .8rem;margin-bottom:.5rem;font-size:.82rem}
.note small{display:block;color:#9ca3af;margin-top:.3rem;font-size:.7rem}

/* Calendar */
.cal-head{display:flex;align-items:center;gap:1rem;margin-bottom:1rem}
.cal-head h2{font-size:1.2rem;color:var(--purple-d);min-width:180px;text-align:center}
.cal-nav{width:36px;height:36px;border-radius:10px;border:1.5px solid #e5e7eb;background:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:var(--purple)}
.cal-nav:hover{background:var(--purple);color:#fff}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{text-align:center;font-size:.72rem;font-weight:700;color:#8b8a96;text-transform:uppercase;padding:.4rem 0}
.cal-cell{min-height:96px;background:#fff;border:1px solid #f0eef6;border-radius:11px;padding:.45rem;cursor:pointer;transition:.15s}
.cal-cell:hover{border-color:var(--purple);background:var(--cream)}
.cal-cell.empty{background:transparent;border:none;cursor:default}
.cal-cell.today{border-color:var(--gold);box-shadow:0 0 0 2px rgba(245,158,11,.25)}
.cal-cell .dn{font-size:.78rem;font-weight:600;color:#374151}
.cal-ev{font-size:.66rem;color:#fff;padding:.12rem .35rem;border-radius:5px;margin-top:.2rem;overflow:hidden;
  white-space:nowrap;text-overflow:ellipsis}
.cal-legend{display:flex;flex-wrap:wrap;gap:1rem;margin-top:1rem;font-size:.78rem;color:#6b7280}
.cal-legend span{display:inline-flex;align-items:center;gap:.4rem}
.cal-legend i{width:12px;height:12px;border-radius:4px;display:inline-block}

/* Carer/staff cards */
.cards3{grid-template-columns:repeat(3,1fr)}
.cards2{grid-template-columns:repeat(2,1fr)}
.pcard{padding:1.2rem;display:flex;flex-direction:column}
.pcard .ph{display:flex;gap:.9rem;align-items:center;margin-bottom:.8rem}
.pcard .photo{width:54px;height:54px;border-radius:50%;object-fit:cover;background:var(--purple);color:#fff;
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.2rem;flex:none}
.pcard h3{font-size:.98rem;color:var(--purple-d)}
.pcard .sub{font-size:.78rem;color:#8b8a96}
.meta-row{display:flex;align-items:center;gap:.45rem;font-size:.8rem;color:#6b7280;margin-top:.4rem}
.meta-row svg{width:14px;height:14px;flex:none;color:#9ca3af}

/* Featured staff */
.featured{padding:1.6rem;display:flex;gap:1.5rem;align-items:center;
  border:2px solid var(--gold);background:linear-gradient(110deg,#fff,#fffbf3)}
.featured .photo{width:96px;height:96px;border-radius:50%;object-fit:cover;flex:none;border:3px solid var(--gold)}
.featured h2{font-size:1.5rem;color:var(--purple-d)}
.ceo-badge{background:var(--gold);color:#1f1300;font-size:.66rem;font-weight:700;padding:.25rem .65rem;
  border-radius:30px;text-transform:uppercase;letter-spacing:.6px}

.empty-state{padding:3rem;text-align:center;color:#9ca3af}
.empty-state svg{width:48px;height:48px;margin-bottom:.8rem;opacity:.5}

.tabs{display:flex;gap:.3rem;border-bottom:1px solid #f0eef6;margin-bottom:1rem}
.tab{padding:.6rem .9rem;cursor:pointer;font-size:.85rem;font-weight:600;color:#8b8a96;border-bottom:2px solid transparent}
.tab.on{color:var(--purple);border-color:var(--gold)}

@media(max-width:980px){.stats,.cards3,.cards2{grid-template-columns:repeat(2,1fr)}}
@media(max-width:780px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:none}
  .main{margin-left:0}
  .topbar .hamb{display:block}
  .stats,.cards3,.cards2,.cal-grid{grid-template-columns:repeat(1,1fr)}
  .cal-grid{grid-template-columns:repeat(7,1fr)}
}
</style>
</head>
<body>
<div id="cursor"></div><div id="cursor-dot"></div>
<div class="app">

  <!-- ── SIDEBAR ─────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-brand">
      <div class="star"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5Z" fill="#F59E0B"/></svg></div>
      <div><div class="bn">Epiphany</div><div class="bs">Staff Portal</div></div>
    </div>
    <nav class="sb-nav" id="nav"></nav>
    <div class="sb-user" id="sbUser"></div>
  </aside>

  <!-- ── MAIN ────────────────────────── -->
  <div class="main">
    <header class="topbar">
      <button class="hamb" id="hamb"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#78350F" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <h1 id="panelTitle">Overview</h1>
      <div class="right">
        <div style="position:relative">
          <button class="bell" id="bell"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><span class="dot" id="bellDot">0</span></button>
        </div>
        <div class="chip-user" id="topUser"></div>
        <span class="topdate" id="topDate"></span>
      </div>
    </header>
    <div class="bell-dd" id="bellDd"></div>

    <main class="content">
      <section class="panel active" id="panel-overview"></section>
      <section class="panel" id="panel-enquiries"></section>
      <section class="panel" id="panel-calendar"></section>
      <section class="panel" id="panel-meetings"></section>
      <section class="panel" id="panel-carers"></section>
      <section class="panel" id="panel-staff"></section>
      <section class="panel" id="panel-profile"></section>
    </main>
  </div>
</div>

<!-- Drawer (enquiry detail) -->
<div class="overlay" id="overlay"></div>
<aside class="drawer" id="drawer"></aside>

<!-- Generic modal -->
<div class="modal" id="modal">
  <div class="modal-bg" data-close></div>
  <div class="modal-box" id="modalBox"></div>
</div>

<script>

function navigate(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active', n.dataset.panel===id));
  $('#panel-'+id).classList.add('active');
  $('#panelTitle').textContent = NAV.find(n=>n.id===id).label;
  RENDERERS[id]();
  $('#sidebar').classList.remove('open');
  $('#bellDd').classList.remove('show');
}

function greeting(){ const h=new Date().getHours(); return h<12?'Good morning':h<18?'Good afternoon':'Good evening'; }
function thisWeekMeetings(){
  const now=new Date(), wk=new Date(); wk.setDate(now.getDate()+7);
  return get('efc_meetings').filter(m=>{const d=new Date(m.date);return d>=now&&d<=wk;});
}
function renderOverview(){
  const enq=get('efc_enquiries'), carers=get('efc_carers'), meetings=get('efc_meetings');
  const newEnq=enq.filter(e=>e.status==='new').length;
  const activeCarers=carers.filter(c=>c.status==='active').length;
  const upcoming=get('efc_meetings').filter(m=>new Date(m.date)>=new Date()).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const weekCount=thisWeekMeetings().length;

  const stat=(lbl,num,color,svg)=>'<div class="card stat"><div class="ic" style="background:'+color+'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">'+svg+'</svg></div><div class="lbl">'+lbl+'</div><div class="num">'+num+'</div></div>';

  let html =
    '<div class="welcome"><h2 class="serif">'+greeting()+', '+esc(USER.firstName)+'</h2>'+

    '<div style="margin-top:.7rem;position:relative;z-index:1">'+USER.tags.map(t=>'<span class="tag" style="background:'+t.color+'">'+esc(t.label)+'</span>').join('')+'</div></div>';

  html += '<div class="grid stats" style="margin-bottom:1.4rem">'+
    stat('Total Enquiries',enq.length,'#78350F','<path d="M22 12h-6l-2 3h-4l-2-3H2"/><path d="M5.45 5.11L2 12v6a2 2 0 002 2h16a2 2 0 002-2v-6l-3.45-6.89A2 2 0 0016.76 4H7.24a2 2 0 00-1.79 1.11z"/>')+
    stat('New Enquiries',newEnq,'#E85D4A','<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>')+
    stat('Active Carers',activeCarers,'#0F766E','<path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78L12 21.23l8.84-8.84a5.5 5.5 0 000-7.78z"/>')+
    stat('Meetings This Week',weekCount,'#F59E0B','<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>')+
    '</div>';

  // Recent enquiries
  const recent=enq.slice(0,5);
  html += '<div class="grid cards2">';
  html += '<div class="card" style="padding:1.2rem"><div class="section-h"><h2>Recent Enquiries</h2><a class="link" data-go="enquiries">View all →</a></div>'+
    '<table><thead><tr><th>Name</th><th>Type</th><th>Date</th><th>Status</th></tr></thead><tbody>'+
    recent.map(e=>'<tr><td>'+esc(e.first+' '+e.last)+'</td><td><span class="badge" style="background:'+interestColor(e.interest)+'">'+interestLabel(e.interest)+'</span></td><td>'+fmtDate(e.timestamp)+'</td><td><span class="status st-'+e.status+'">'+statusLabel(e.status)+'</span></td></tr>').join('')+
    '</tbody></table></div>';

  // Upcoming meetings
  html += '<div class="card" style="padding:1.2rem"><div class="section-h"><h2>Upcoming Meetings</h2><a class="link" data-go="meetings">View all →</a></div>'+
    (upcoming.length?upcoming.slice(0,3).map(m=>
      '<div style="border:1px solid #f0eef6;border-radius:12px;padding:.85rem;margin-bottom:.7rem">'+

  $('#enqSearch').addEventListener('input',e=>{enqFilter.search=e.target.value;drawEnqTable();});

function filteredEnq(){
  return get('efc_enquiries').filter(e=>{
    if(enqFilter.type!=='all'){ const map={become:['become','carer'],refer:['refer'],info:['info'],social_worker:['social_worker']};
      if(!map[enqFilter.type].includes(e.interest)) return false; }
    if(enqFilter.status!=='all' && e.status!==enqFilter.status) return false;
    if(enqFilter.search){ const q=enqFilter.search.toLowerCase();
      if(!(e.first+' '+e.last+' '+e.email).toLowerCase().includes(q)) return false; }
    return true;
  });
}

function markContacted(id){

function notesHtml(notes){ return (notes&&notes.length)?notes.map(n=>'<div class="note">'+esc(n.text)+'<small>'+esc(n.author)+' · '+new Date(n.ts).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})+'</small></div>').join(''):'<div style="color:#bbb;font-size:.8rem;padding:.5rem 0">No notes yet.</div>'; }
function saveEnq(id){
  const list=get('efc_enquiries'); const e=list.find(x=>x.id===id); if(!e)return;

function addNote(id){
  const txt=$('#dNote').value.trim(); if(!txt)return;

/* ════════════════════════════════════════════════════
   CALENDAR
   ════════════════════════════════════════════════════ */
let calRef=new Date();
function renderCalendar(){
  const y=calRef.getFullYear(), m=calRef.getMonth();
  const first=new Date(y,m,1); let startDow=(first.getDay()+6)%7; // Mon=0
  const days=new Date(y,m+1,0).getDate();
  const events=get('efc_events');
  const today=new Date();
  const dows=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  let cells='';
  for(let i=0;i<startDow;i++) cells+='<div class="cal-cell empty"></div>';
  for(let d=1;d<=days;d++){
    const iso=new Date(y,m,d).toISOString().slice(0,10);
    const dayEv=events.filter(e=>e.date.slice(0,10)===iso);
    const isToday=today.getFullYear()===y&&today.getMonth()===m&&today.getDate()===d;
    cells+='<div class="cal-cell'+(isToday?' today':'')+'" data-date="'+iso+'"><div class="dn">'+d+'</div>'+
      dayEv.map(e=>'<div class="cal-ev" style="background:'+(EVENT_COLORS[e.type]||'#6b7280')+'" title="'+esc(e.title)+'">'+esc(e.title)+'</div>').join('')+'</div>';
  }
  $('#panel-calendar').innerHTML =
    '<div class="card" style="padding:1.4rem">'+
    '<div class="cal-head"><button class="cal-nav" id="calPrev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>'+
    '<h2 class="serif">'+calRef.toLocaleDateString('en-GB',{month:'long',year:'numeric'})+'</h2>'+
    '<button class="cal-nav" id="calNext"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>'+
    '<button class="btn btn-primary btn-sm" style="margin-left:auto" id="calAdd">+ Add Event</button></div>'+
    '<div class="cal-grid">'+dows.map(d=>'<div class="cal-dow">'+d+'</div>').join('')+cells+'</div>'+
    '<div class="cal-legend">'+Object.entries(EVENT_COLORS).map(([k,c])=>'<span><i style="background:'+c+'"></i>'+k+'</span>').join('')+'</div>'+
    '</div>';
  $('#calPrev').addEventListener('click',()=>{calRef.setMonth(calRef.getMonth()-1);renderCalendar();});
  $('#calNext').addEventListener('click',()=>{calRef.setMonth(calRef.getMonth()+1);renderCalendar();});
  $('#calAdd').addEventListener('click',()=>eventModal(new Date().toISOString().slice(0,10)));
  $('#panel-calendar').querySelectorAll('.cal-cell:not(.empty)').forEach(c=>c.addEventListener('click',()=>eventModal(c.dataset.date)));
}
function eventModal(dateIso){
  openModal('Add Event',
    '<div class="fl"><label>Title</label><input class="inp" id="evTitle" placeholder="Event title"></div>'+
    '<div class="fl"><label>Type</label><select class="inp" id="evType">'+Object.keys(EVENT_COLORS).map(t=>'<option>'+t+'</option>').join('')+'</select></div>'+
    '<div class="fl"><label>Date</label><input class="inp" type="date" id="evDate" value="'+dateIso+'"></div>'+
    '<div class="fl"><label>Time</label><input class="inp" type="time" id="evTime" value="09:00"></div>'+
    '<div class="fl"><label>Notes</label><textarea class="inp" id="evNotes" rows="2"></textarea></div>',
    '<button class="btn btn-ghost" data-close>Cancel</button><button class="btn btn-primary" id="evSave">Save Event</button>');
  $('#evSave').addEventListener('click',()=>{
    const t=$('#evTitle').value.trim(); if(!t){$('#evTitle').focus();return;}
    const list=get('efc_events');
    list.push({id:'ev_'+Date.now(),date:$('#evDate').value,title:t,type:$('#evType').value,time:$('#evTime').value,notes:$('#evNotes').value.trim()});
    set('efc_events',list); closeModal(); renderCalendar();
  });
}

  let list = mtgTab==='upcoming'?all.filter(m=>new Date(m.date)>=now):mtgTab==='past'?all.filter(m=>new Date(m.date)<now):all;

    [['upcoming','Upcoming'],['past','Past'],['all','All']].map(([v,l])=>'<div class="tab'+(mtgTab===v?' on':'')+'" data-tab="'+v+'">'+l+'</div>').join('')+

let carerFilter={search:'',ssw:'all',status:'all'};
const CARER_STATUS={active:{l:'Active',c:'#dcfce7',t:'#15803d'},on_leave:{l:'On Leave',c:'#fef3c7',t:'#b45309'},assessment:{l:'Assessment',c:'#dbeafe',t:'#1d4ed8'}};
function renderCarers(){
  $('#panel-carers').innerHTML =
    '<div class="card" style="padding:1rem;margin-bottom:1.2rem;display:flex;gap:.8rem;flex-wrap:wrap;align-items:center">'+
    '<input class="inp" id="carerSearch" placeholder="Search carers…" style="flex:1;min-width:180px" value="'+esc(carerFilter.search)+'">'+
    '<select class="inp" id="carerSsw" style="width:auto"><option value="all">All SSWs</option>'+STAFF.filter(s=>s.access==='social_worker'||s.access==='recruitment').map(s=>'<option value="'+s.id+'"'+(carerFilter.ssw===s.id?' selected':'')+'>'+esc(s.firstName)+'</option>').join('')+'</select>'+
    '<select class="inp" id="carerStatus" style="width:auto"><option value="all">All Statuses</option>'+Object.entries(CARER_STATUS).map(([v,o])=>'<option value="'+v+'"'+(carerFilter.status===v?' selected':'')+'>'+o.l+'</option>').join('')+'</select>'+
    '</div><div id="carerGrid"></div>';
  $('#carerSearch').addEventListener('input',e=>{carerFilter.search=e.target.value;drawCarers();});
  $('#carerSsw').addEventListener('change',e=>{carerFilter.ssw=e.target.value;drawCarers();});
  $('#carerStatus').addEventListener('change',e=>{carerFilter.status=e.target.value;drawCarers();});
  drawCarers();
}
function drawCarers(){
  let list=get('efc_carers').filter(c=>{
    if(carerFilter.search&&!c.name.toLowerCase().includes(carerFilter.search.toLowerCase()))return false;
    if(carerFilter.ssw!=='all'&&c.ssw!==carerFilter.ssw)return false;
    if(carerFilter.status!=='all'&&c.status!==carerFilter.status)return false;
    return true;
  });
  if(!list.length){ $('#carerGrid').innerHTML='<div class="card empty-state">No carers match your filters.</div>'; return; }
  $('#carerGrid').innerHTML='<div class="grid cards3">'+list.map(c=>{
    const ssw=staffById(c.ssw); const st=CARER_STATUS[c.status]; const current=c.placements.filter(p=>!p.end).length;
    return '<div class="card pcard"><div class="ph"><div class="photo">'+initials(c.name)+'</div>'+
      '<div><h3>'+esc(c.name)+'</h3><div class="sub">'+(c.approved?'Approved '+fmtDate(c.approved):'In assessment')+'</div></div></div>'+
      '<div>'+c.types.map(t=>'<span class="tag" style="background:'+placeColor(t)+'">'+t+'</span>').join('')+'</div>'+
      '<div class="meta-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0116 0"/></svg>SSW: '+(ssw?esc(ssw.firstName):'—')+'</div>'+
      '<div style="margin-top:.5rem"><span class="status" style="background:'+st.c+';color:'+st.t+'">'+st.l+'</span></div>'+
      '<div class="meta-row">'+(c.nextReview?'Next review: '+fmtDate(c.nextReview):'No review scheduled')+' · '+current+' current placement'+(current!==1?'s':'')+'</div>'+
      '<button class="btn btn-ghost btn-sm" style="margin-top:.8rem;align-self:flex-start" data-carer="'+c.id+'">View Profile</button></div>';
  }).join('')+'</div>';
  $('#carerGrid').querySelectorAll('[data-carer]').forEach(b=>b.addEventListener('click',()=>openCarer(b.dataset.carer)));
}
function placeColor(t){ return ({Emergency:'#E85D4A','Short-term':'#F59E0B','Long-term':'#78350F',UASC:'#0F766E',Therapeutic:'#3d2a8a'})[t]||'#6b7280'; }
let carerTab='overview', carerCur=null;
function openCarer(id){
  carerCur=get('efc_carers').find(c=>c.id===id); carerTab='overview'; if(!carerCur)return;
  drawCarerModal();
}
function drawCarerModal(){
  const c=carerCur; const st=CARER_STATUS[c.status]; const ssw=staffById(c.ssw);
  let tabBody='';
  if(carerTab==='overview'){
    tabBody='<div class="detail-row"><span class="k">Area</span><span class="v">'+esc(c.area)+'</span></div>'+
      '<div class="detail-row"><span class="k">Household</span><span class="v">'+esc(c.household)+'</span></div>'+
      '<div class="detail-row"><span class="k">Approved</span><span class="v">'+(c.approved?fmtDate(c.approved):'Pending')+'</span></div>'+
      '<div class="detail-row"><span class="k">Approval type</span><span class="v">'+c.types.join(', ')+'</span></div>'+
      '<div class="detail-row"><span class="k">SSW</span><span class="v">'+(ssw?esc(ssw.name):'—')+'</span></div>'+
      '<div class="detail-row"><span class="k">Next review</span><span class="v">'+(c.nextReview?fmtDate(c.nextReview):'—')+'</span></div>';
  } else if(carerTab==='placements'){
    tabBody = c.placements.length?'<table><thead><tr><th>Child</th><th>Age</th><th>Type</th><th>Start</th><th>End</th></tr></thead><tbody>'+
      c.placements.map(p=>'<tr><td>'+esc(p.child)+'</td><td>'+p.age+'</td><td><span class="tag" style="background:'+placeColor(p.type)+'">'+p.type+'</span></td><td>'+fmtDate(p.start)+'</td><td>'+(p.end?fmtDate(p.end):'<strong style="color:var(--teal)">Current</strong>')+'</td></tr>').join('')+'</tbody></table>'
      :'<div class="empty-state">No placements recorded.</div>';
  } else if(carerTab==='reviews'){
    tabBody = c.reviews.length?c.reviews.map(r=>'<div class="note"><strong>'+fmtDate(r.date)+'</strong> — '+esc(r.outcome)+'<br>'+esc(r.notes)+'</div>').join('')
      :'<div class="empty-state">No reviews recorded.</div>';
  } else {
    tabBody='<textarea class="inp" id="carerNote" rows="3" placeholder="Add a note…"></textarea>'+
      '<button class="btn btn-ghost btn-sm" style="margin-top:.5rem" id="carerNoteAdd">Add Note</button>'+
      '<div class="notes-list">'+notesHtml(c.cnotes)+'</div>';
  }
  openModal('',
    '<div style="display:flex;gap:1rem;align-items:center;margin-bottom:1rem"><div class="photo" style="width:64px;height:64px;border-radius:50%;background:var(--purple);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.4rem">'+initials(c.name)+'</div>'+
    '<div><h3 class="serif" style="font-size:1.3rem;color:var(--purple-d)">'+esc(c.name)+'</h3>'+
    '<div style="font-size:.78rem;color:#9ca3af">ID: '+esc(c.id)+'</div>'+
    '<span class="status" style="background:'+st.c+';color:'+st.t+';margin-top:.3rem">'+st.l+'</span></div></div>'+
    '<div class="tabs">'+[['overview','Overview'],['placements','Placements'],['reviews','Reviews'],['notes','Notes']].map(([v,l])=>'<div class="tab'+(carerTab===v?' on':'')+'" data-ctab="'+v+'">'+l+'</div>').join('')+'</div>'+
    '<div>'+tabBody+'</div>',
    '<button class="btn btn-primary" data-close>Close</button>');
  $('#modalBox').querySelectorAll('[data-ctab]').forEach(t=>t.addEventListener('click',()=>{carerTab=t.dataset.ctab;drawCarerModal();}));
  if(carerTab==='notes'){ $('#carerNoteAdd').addEventListener('click',()=>{
    const txt=$('#carerNote').value.trim(); if(!txt)return;
    const list=get('efc_carers'); const cc=list.find(x=>x.id===c.id);
    cc.cnotes=cc.cnotes||[]; cc.cnotes.push({text:txt,author:USER.name,ts:new Date().toISOString()});
    set('efc_carers',list); carerCur=cc; drawCarerModal();
  }); }
}

    '<div class="card featured">'+staffPhoto(rose,96)+

    '<div style="color:#6b7280;margin:.3rem 0">'+esc(rose.role)+' · '+esc(rose.dept)+'</div>'+
    '<div>'+rose.tags.map(t=>'<span class="tag" style="background:'+t.color+'">'+esc(t.label)+'</span>').join('')+'</div>'+
    '<p style="font-size:.86rem;color:#4b5563;margin-top:.6rem;max-width:48rem">'+esc(rose.bio)+'</p>'+
    '<div style="margin-top:.7rem"><button class="btn btn-purple btn-sm" data-staff="'+rose.id+'">View Profile</button> '+

    '<div class="card pcard" style="cursor:pointer" data-staff="'+s.id+'"><div class="ph">'+staffPhoto(s,54)+
    '<div><h3>'+esc(s.name)+'</h3><div class="sub">'+esc(s.role)+'</div></div></div>'+
    '<span class="badge" style="background:#eef0fb;color:var(--purple)">'+esc(s.dept)+'</span>'+
    '<div style="margin:.5rem 0">'+s.tags.map(t=>'<span class="tag" style="background:'+t.color+'">'+esc(t.label)+'</span>').join('')+'</div>'+

    '<div class="meta-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><polyline points="22,6 12,13 2,6"/></svg><a href="mailto:'+s.email+'" onclick="event.stopPropagation()">'+esc(s.email)+'</a></div>'+
    '<div class="meta-row"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.1 1.22 2 2 0 012.11 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.09a16 16 0 006 6l.46-.46a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>'+esc(s.phone)+'</div>'+
    '<button class="btn btn-ghost btn-sm" style="margin-top:.7rem;align-self:flex-start" onclick="event.stopPropagation();location.href=\'mailto:'+s.email+'\'">Message</button></div>'
  ).join('')+'</div>';

  $('#panel-staff').innerHTML=html;
  $('#panel-staff').querySelectorAll('[data-staff]').forEach(el=>el.addEventListener('click',e=>{ if(e.target.closest('a'))return; openStaff(el.dataset.staff); }));

function openStaff(id){
  const s=staffById(id); if(!s)return;
  openModal('',
    '<div style="text-align:center;margin-bottom:1rem">'+staffPhoto(s,100)+
    '<h3 class="serif" style="font-size:1.5rem;color:var(--purple-d);margin-top:.6rem">'+esc(s.name)+'</h3>'+
    '<div style="color:#6b7280">'+esc(s.role)+'</div>'+
    '<div style="margin-top:.5rem">'+s.tags.map(t=>'<span class="tag" style="background:'+t.color+'">'+esc(t.label)+'</span>').join('')+'</div></div>'+
    '<p style="font-size:.88rem;color:#4b5563;line-height:1.6;margin-bottom:1rem">'+esc(s.bio)+'</p>'+
    '<div class="detail-row"><span class="k">Department</span><span class="v">'+esc(s.dept)+'</span></div>'+
    '<div class="detail-row"><span class="k">Email</span><span class="v"><a href="mailto:'+s.email+'">'+esc(s.email)+'</a></span></div>'+
    '<div class="detail-row"><span class="k">Phone</span><span class="v">'+esc(s.phone)+'</span></div>'+
    '<div class="detail-row"><span class="k">Joined</span><span class="v">'+fmtDate(s.joined)+'</span></div>'+
    '<div class="detail-row"><span class="k">Active cases</span><span class="v">'+s.activeCases+'</span></div>',
    '<a class="btn btn-primary" href="mailto:'+s.email+'">Send Email</a><button class="btn btn-ghost" data-close>Close</button>');
}

/* ════════════════════════════════════════════════════
   MY PROFILE
   ════════════════════════════════════════════════════ */
function renderProfile(){
  const s=USER;
  $('#panel-profile').innerHTML =
    '<div class="card" style="padding:1.8rem;max-width:720px">'+
    '<div style="display:flex;gap:1.3rem;align-items:center;flex-wrap:wrap">'+staffPhoto(s,100)+
    '<div><h2 class="serif" style="font-size:1.6rem;color:var(--purple-d)">'+esc(s.name)+'</h2>'+
    '<div style="color:#6b7280">'+esc(s.role)+' · '+esc(s.dept)+'</div>'+
    '<div style="margin-top:.5rem">'+s.tags.map(t=>'<span class="tag" style="background:'+t.color+'">'+esc(t.label)+'</span>').join('')+'</div></div></div>'+
    '<div class="fl" style="margin-top:1.4rem"><label>Bio</label><textarea class="inp" id="pfBio" rows="3" style="resize:vertical">'+esc(s.bio)+'</textarea></div>'+
    '<div style="display:flex;gap:.8rem;flex-wrap:wrap"><div class="fl" style="flex:1;min-width:220px"><label>Email (read only)</label><input class="inp" value="'+esc(s.email)+'" readonly style="background:#f5f4fa"></div>'+
    '<div class="fl" style="flex:1;min-width:180px"><label>Phone</label><input class="inp" id="pfPhone" value="'+esc(s.phone)+'"></div></div>'+
    '<div class="fl"><label>Password</label><div style="position:relative"><input class="inp" id="pfPwd" type="password" value="'+esc(s.password||'••••••••')+'" readonly>'+
    '<button class="btn btn-ghost btn-sm" id="pfEye" style="position:absolute;right:6px;top:50%;transform:translateY(-50%)">Show</button></div>'+
    '<small style="color:#9ca3af">Demo only — contact IT to change your password.</small></div>'+
    '<div style="margin-top:1.4rem"><label style="font-weight:600;font-size:.85rem">Recent activity</label><div class="notes-list">'+
      recentActivityHtml()+'</div></div>'+
    '<button class="btn btn-ghost" id="pfLogout" style="margin-top:1.4rem;color:var(--coral);border-color:#fecaca">Log out</button>'+
    '</div>';
  $('#pfBio').addEventListener('blur',()=>{ USER.bio=$('#pfBio').value; sessionStorage.setItem('efc_user',JSON.stringify(USER)); });
  $('#pfPhone').addEventListener('blur',()=>{ USER.phone=$('#pfPhone').value; sessionStorage.setItem('efc_user',JSON.stringify(USER)); });
  $('#pfEye').addEventListener('click',()=>{ const p=$('#pfPwd'); const sh=p.type==='password'; p.type=sh?'text':'password'; $('#pfEye').textContent=sh?'Hide':'Show'; });
  $('#pfLogout').addEventListener('click',logout);
}
function recentActivityHtml(){
  const enq=get('efc_enquiries'), m=get('efc_meetings');
  const items=[];
  if(enq[0]) items.push({t:'Latest enquiry received from '+enq[0].first+' '+enq[0].last, ts:enq[0].timestamp});
  const upcoming=m.filter(x=>new Date(x.date)>=new Date()).sort((a,b)=>new Date(a.date)-new Date(b.date))[0];
  if(upcoming) items.push({t:'Next meeting: '+upcoming.title, ts:upcoming.date});
  items.push({t:'Signed in to the staff portal', ts:new Date().toISOString()});
  return items.slice(0,3).map(i=>'<div class="note">'+esc(i.t)+'<small>'+fmtDate(i.ts)+'</small></div>').join('');
}

/* ════════════════════════════════════════════════════
   MODAL / DRAWER / BELL
   ════════════════════════════════════════════════════ */
function openModal(title,body,footer){
  $('#modalBox').innerHTML =
    (title?'<div class="modal-h"><h3>'+esc(title)+'</h3><button class="close-x" data-close><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>':'')+
    '<div class="modal-b">'+body+'</div>'+
    (footer?'<div class="modal-f">'+footer+'</div>':'');
  $('#modal').classList.add('show');
  $('#modalBox').querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click',closeModal));
}
function closeModal(){ $('#modal').classList.remove('show'); }
$('#modal').querySelector('.modal-bg').addEventListener('click',closeModal);

function showDrawer(){ $('#drawer').classList.add('show'); $('#overlay').classList.add('show'); }
function closeDrawer(){ $('#drawer').classList.remove('show'); $('#overlay').classList.remove('show'); }
$('#overlay').addEventListener('click',closeDrawer);

$('#bell').addEventListener('click',e=>{
  e.stopPropagation();
  const newEnq=get('efc_enquiries').filter(x=>x.status==='new').slice(0,5);
  $('#bellDd').innerHTML='<div class="bh">New Enquiries</div>'+
    (newEnq.length?newEnq.map(x=>'<div class="bi" data-bid="'+x.id+'"><strong>'+esc(x.first+' '+x.last)+'</strong><br><small>'+interestLabel(x.interest)+' · '+fmtDate(x.timestamp)+'</small></div>').join(''):'<div class="empty">No new enquiries.</div>');
  $('#bellDd').classList.toggle('show');
  $('#bellDd').querySelectorAll('[data-bid]').forEach(b=>b.addEventListener('click',()=>{$('#bellDd').classList.remove('show');navigate('enquiries');setTimeout(()=>openEnq(b.dataset.bid),50);}));
});
document.addEventListener('click',()=>$('#bellDd').classList.remove('show'));
$('#bellDd').addEventListener('click',e=>e.stopPropagation());
document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeModal();closeDrawer();$('#bellDd').classList.remove('show');} });

$('#hamb').addEventListener('click',()=>$('#sidebar').classList.toggle('open'));

/* ── Custom cursor ── */
(function(){
  const c=document.getElementById('cursor'),d=document.getElementById('cursor-dot');
  if(!c||!window.matchMedia('(hover:hover)').matches)return;
  let mx=0,my=0,cx=0,cy=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  (function tick(){cx+=(mx-cx)*.12;cy+=(my-cy)*.12;c.style.left=cx+'px';c.style.top=cy+'px';d.style.left=mx+'px';d.style.top=my+'px';requestAnimationFrame(tick);})();
  document.querySelectorAll('a,button,[role=button],.nav-item').forEach(el=>{
    el.addEventListener('mouseenter',()=>document.body.classList.add('cursor-link'));
    el.addEventListener('mouseleave',()=>document.body.classList.remove('cursor-link'));
  });
})();
/* ── Boot ───────────────────────────────── */
buildNav();
refreshBadges();
navigate('overview');
</script>
