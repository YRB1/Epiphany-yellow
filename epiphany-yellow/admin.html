<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BrightPath — Admin Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#78350F;--navy-d:#431407;--teal:#0F766E;--teal-l:#14B8A6;
  --cream:#FFFBEB;--white:#fff;--ink:#111827;--muted:#6b7280;
  --f:Inter,system-ui,sans-serif;
}
body{font-family:var(--f);background:#f1f5f9;color:var(--ink);-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
/* Sidebar */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;width:240px;
  background:var(--navy-d);
  display:flex;flex-direction:column;padding:1.5rem 1rem;
  border-right:1px solid rgba(255,255,255,.05);
  z-index:100;
}
.sb-logo{display:flex;align-items:center;gap:.65rem;padding:.5rem .5rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:1rem}
.sb-mark{width:34px;height:34px;border-radius:8px;background:var(--teal);display:grid;place-items:center;flex-shrink:0}
.sb-name{font-size:.85rem;font-weight:700;color:#fff}
.sb-sub{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.sb-link{
  display:flex;align-items:center;gap:.65rem;
  padding:.6rem .75rem;border-radius:.6rem;
  font-size:.82rem;font-weight:500;color:rgba(255,255,255,.45);
  cursor:pointer;transition:background .15s,color .15s;
  border:none;background:none;font-family:var(--f);width:100%;text-align:left;
}
.sb-link:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8)}
.sb-link.on{background:rgba(42,157,143,.15);color:var(--teal-l)}
.sb-link svg{flex-shrink:0;opacity:.7}
.sb-link.on svg{opacity:1}
.sb-divider{height:1px;background:rgba(255,255,255,.06);margin:.5rem 0}
.sb-foot{margin-top:auto;padding-top:1rem;border-top:1px solid rgba(255,255,255,.06)}
.sb-site{display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:rgba(255,255,255,.3);padding:.5rem .75rem;border-radius:.6rem;transition:color .15s}
.sb-site:hover{color:rgba(255,255,255,.65)}
/* Main */
.main{margin-left:240px;min-height:100vh;padding:2rem}
/* Header */
.page-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem}
.page-hdr h1{font-size:1.4rem;font-weight:700;color:var(--navy)}
.page-hdr p{font-size:.82rem;color:var(--muted);margin-top:.2rem}
.hdr-right{display:flex;gap:.6rem;align-items:center}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.58rem 1.1rem;border-radius:.6rem;font-size:.78rem;font-weight:600;border:none;cursor:pointer;font-family:var(--f);transition:opacity .15s,transform .15s}
.btn:hover{opacity:.88;transform:translateY(-1px)}
.btn-navy{background:var(--navy);color:#fff}
.btn-teal{background:var(--teal);color:#fff}
.btn-ghost{background:rgba(120,53,15,.07);color:var(--navy)}
/* Stats row */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1.25rem;margin-bottom:2rem}
.stat-card{background:#fff;border-radius:1rem;padding:1.4rem 1.5rem;border:1px solid rgba(120,53,15,.06)}
.sc-label{font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
.sc-val{font-size:2rem;font-weight:700;color:var(--navy);line-height:1}
.sc-sub{font-size:.75rem;color:var(--muted);margin-top:.25rem}
.sc-teal .sc-val{color:var(--teal)}
/* Filters */
.filters{display:flex;align-items:center;gap:.6rem;margin-bottom:1.25rem;flex-wrap:wrap}
.search{flex:1;min-width:220px;padding:.6rem .9rem;border-radius:.6rem;border:1.5px solid rgba(120,53,15,.1);font-family:var(--f);font-size:.82rem;color:var(--navy);outline:none;transition:border-color .2s}
.search:focus{border-color:var(--teal)}
.filter-btn{padding:.5rem 1rem;border-radius:.6rem;border:1.5px solid rgba(120,53,15,.1);background:#fff;font-family:var(--f);font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .15s}
.filter-btn.on,.filter-btn:hover{border-color:var(--navy);color:var(--navy);background:rgba(120,53,15,.05)}
.filter-btn[data-f].on{background:var(--navy);color:#fff;border-color:var(--navy)}
/* Table */
.table-wrap{background:#fff;border-radius:1rem;border:1px solid rgba(120,53,15,.06);overflow:hidden}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:.85rem 1.25rem;background:#f8fafc;border-bottom:1px solid rgba(120,53,15,.06)}
td{padding:1rem 1.25rem;border-bottom:1px solid rgba(120,53,15,.04);font-size:.84rem;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.td-name{font-weight:600;color:var(--navy)}
.td-email{color:var(--muted)}
.td-phone a{color:var(--navy);font-weight:500}
.badge{display:inline-block;padding:.22rem .7rem;border-radius:99px;font-size:.68rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.badge-new{background:rgba(42,157,143,.1);color:var(--teal)}
.badge-contacted{background:rgba(120,53,15,.08);color:var(--navy)}
.badge-approved{background:rgba(34,197,94,.1);color:#16a34a}
.badge-declined{background:rgba(239,68,68,.08);color:#dc2626}
.badge-become{background:rgba(42,157,143,.1);color:var(--teal)}
.badge-learn{background:rgba(120,53,15,.07);color:var(--navy)}
.badge-transfer{background:rgba(245,158,11,.1);color:#d97706}
.td-date{color:var(--muted);font-size:.78rem}
.action-btn{
  padding:.3rem .7rem;border-radius:.45rem;border:1px solid rgba(120,53,15,.1);
  background:#fff;font-size:.72rem;font-weight:600;cursor:pointer;
  font-family:var(--f);color:var(--muted);transition:all .15s;
}
.action-btn:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
/* Status dropdown */
.status-select{
  padding:.3rem .65rem;border-radius:.45rem;border:1px solid rgba(120,53,15,.12);
  font-family:var(--f);font-size:.72rem;font-weight:600;color:var(--navy);
  background:#fff;cursor:pointer;outline:none;
}
/* Modal */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;
  place-items:center;backdrop-filter:blur(4px);
}
.modal-overlay.show{display:grid}
.modal{background:#fff;border-radius:1.25rem;padding:2rem;max-width:540px;width:calc(100% - 2rem);box-shadow:0 24px 64px rgba(0,0,0,.15)}
.modal h2{font-size:1.2rem;color:var(--navy);margin-bottom:1.25rem}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem}
.modal-field{background:#f8fafc;border-radius:.65rem;padding:.75rem 1rem}
.modal-field label{font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.2rem}
.modal-field p{font-size:.88rem;color:var(--navy);font-weight:500;margin:0}
.modal-msg{background:#f0faf8;border-left:3px solid var(--teal);border-radius:0 .65rem .65rem 0;padding:.85rem 1rem;margin-bottom:1.25rem}
.modal-msg label{font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);display:block;margin-bottom:.25rem}
.modal-msg p{font-size:.85rem;color:#374151;line-height:1.65;margin:0}
.modal-foot{display:flex;gap:.6rem;justify-content:flex-end}
/* Empty state */
.empty{padding:4rem;text-align:center;color:var(--muted)}
.empty svg{margin:0 auto 1rem;opacity:.3}
.empty p{font-size:.9rem}
/* Loader overlay */
#page-loader{
  position:fixed;inset:0;background:#f1f5f9;
  display:grid;place-items:center;z-index:999;
  transition:opacity .4s,visibility .4s;
}
#page-loader.gone{opacity:0;visibility:hidden}
.pl-spin{
  width:36px;height:36px;border-radius:50%;
  border:3px solid rgba(120,53,15,.1);
  border-top-color:var(--teal);
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
/* Toast */
.toast{
  position:fixed;bottom:1.5rem;right:1.5rem;
  background:var(--navy-d);color:#fff;
  padding:.75rem 1.25rem;border-radius:.75rem;
  font-size:.82rem;font-weight:500;
  transform:translateY(120%);opacity:0;
  transition:transform .3s,opacity .3s;z-index:300;
}
.toast.show{transform:none;opacity:1}
</style>
</head>
<body>

<div id="page-loader"><div class="pl-spin"></div></div>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sb-logo">
    <div class="sb-mark">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3C7.03 3 3 7.03 3 12C3 14.83 4.3 17.35 6.35 19L7.8 17.35C6.11 16.04 5 14.14 5 12C5 8.13 8.13 5 12 5C15.87 5 19 8.13 19 12C19 14.14 17.89 16.04 16.2 17.35L17.65 19C19.7 17.35 21 14.83 21 12C21 7.03 16.97 3 12 3Z" fill="white"/><circle cx="12" cy="12" r="3.5" fill="white"/></svg>
    </div>
    <div>
      <div class="sb-name">BrightPath</div>
      <div class="sb-sub">Admin</div>
    </div>
  </div>

  <button class="sb-link on" id="sb-enquiries">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
    Enquiries
  </button>

  <div class="sb-divider"></div>

  <div class="sb-foot">
    <a href="/" target="_blank" class="sb-site sb-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      View website
    </a>
  </div>
</aside>

<!-- Main -->
<main class="main">
  <div class="page-hdr">
    <div>
      <h1>Enquiries</h1>
      <p id="last-updated">Loading...</p>
    </div>
    <div class="hdr-right">
      <button class="btn btn-ghost" onclick="exportCSV()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
      <button class="btn btn-teal" onclick="loadData()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        Refresh
      </button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats">
    <div class="stat-card"><div class="sc-label">Total Enquiries</div><div class="sc-val" id="s-total">—</div></div>
    <div class="stat-card sc-teal"><div class="sc-label">Today</div><div class="sc-val" id="s-today">—</div></div>
    <div class="stat-card"><div class="sc-label">This Week</div><div class="sc-val" id="s-week">—</div></div>
    <div class="stat-card"><div class="sc-label">New (unread)</div><div class="sc-val" id="s-new">—</div></div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <input class="search" type="search" id="search" placeholder="Search name, email, phone…" oninput="applyFilters()">
    <button class="filter-btn on" data-f="all" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" data-f="new" onclick="setFilter('new',this)">New</button>
    <button class="filter-btn" data-f="contacted" onclick="setFilter('contacted',this)">Contacted</button>
    <button class="filter-btn" data-f="approved" onclick="setFilter('approved',this)">Approved</button>
    <button class="filter-btn" data-f="become" onclick="setFilter('become',this)">Become Carer</button>
    <button class="filter-btn" data-f="transfer" onclick="setFilter('transfer',this)">Transfer</button>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Contact</th>
          <th>Interest</th>
          <th>Status</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal" id="modal-inner"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let allData = [];
let activeFilter = 'all';

async function loadData() {
  try {
    const [enquiries, stats] = await Promise.all([
      fetch('/api/admin/enquiries').then(r => r.json()),
      fetch('/api/admin/stats').then(r => r.json())
    ]);

    allData = enquiries;

    document.getElementById('s-total').textContent = stats.total;
    document.getElementById('s-today').textContent = stats.today;
    document.getElementById('s-week').textContent  = stats.week;
    const newCount = stats.byStatus.find(s => s.status === 'new');
    document.getElementById('s-new').textContent = newCount ? newCount.n : 0;
    document.getElementById('last-updated').textContent = 'Last updated ' + new Date().toLocaleTimeString('en-GB');

    applyFilters();
  } catch(e) {
    console.error(e);
    showToast('Failed to load data. Check server connection.');
  } finally {
    document.getElementById('page-loader').classList.add('gone');
  }
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  applyFilters();
}

function applyFilters() {
  const q = (document.getElementById('search').value || '').toLowerCase();
  let rows = allData;

  if (activeFilter !== 'all') {
    rows = rows.filter(r => r.status === activeFilter || r.interest === activeFilter);
  }
  if (q) {
    rows = rows.filter(r =>
      (r.first_name+' '+r.last_name).toLowerCase().includes(q) ||
      r.email.toLowerCase().includes(q) ||
      r.phone.includes(q)
    );
  }
  renderTable(rows);
}

function renderTable(rows) {
  const tbody = document.getElementById('table-body');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <p>No enquiries found</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td>
        <div class="td-name">${esc(r.first_name)} ${esc(r.last_name)}</div>
        <div class="td-email">${esc(r.email)}</div>
      </td>
      <td><a href="tel:${esc(r.phone)}" class="td-phone">${esc(r.phone)}</a></td>
      <td><span class="badge badge-${esc(r.interest)}">${interestLabel(r.interest)}</span></td>
      <td>
        <select class="status-select" data-id="${r.id}" onchange="updateStatus(this)">
          <option value="new"${r.status==='new'?' selected':''}>New</option>
          <option value="contacted"${r.status==='contacted'?' selected':''}>Contacted</option>
          <option value="approved"${r.status==='approved'?' selected':''}>Approved</option>
          <option value="declined"${r.status==='declined'?' selected':''}>Declined</option>
        </select>
      </td>
      <td class="td-date">${fmtDate(r.created_at)}</td>
      <td>
        <button class="action-btn" onclick="openModal(${r.id})">View</button>
      </td>
    </tr>
  `).join('');
}

async function updateStatus(sel) {
  const id = sel.dataset.id;
  const status = sel.value;
  try {
    await fetch(`/api/admin/enquiries/${id}/status`, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ status })
    });
    const row = allData.find(r => r.id == id);
    if (row) row.status = status;
    showToast('Status updated');
    loadData();
  } catch(e) {
    showToast('Update failed');
  }
}

function openModal(id) {
  const r = allData.find(x => x.id === id);
  if (!r) return;
  document.getElementById('modal-inner').innerHTML = `
    <h2>${esc(r.first_name)} ${esc(r.last_name)}</h2>
    <div class="modal-row">
      <div class="modal-field"><label>Email</label><p>${esc(r.email)}</p></div>
      <div class="modal-field"><label>Phone</label><p>${esc(r.phone)}</p></div>
    </div>
    <div class="modal-row">
      <div class="modal-field"><label>Interest</label><p>${interestLabel(r.interest)}</p></div>
      <div class="modal-field"><label>Received</label><p>${fmtDate(r.created_at)}</p></div>
    </div>
    ${r.message ? `<div class="modal-msg"><label>Message</label><p>${esc(r.message)}</p></div>` : ''}
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Close</button>
      <a href="mailto:${esc(r.email)}" class="btn btn-teal">Reply by Email</a>
      <a href="tel:${esc(r.phone)}" class="btn btn-navy">Call Now</a>
    </div>
  `;
  document.getElementById('modal').classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }
document.getElementById('modal').addEventListener('click', e => { if(e.target === document.getElementById('modal')) closeModal(); });

function exportCSV() {
  const rows = allData;
  const header = ['ID','First Name','Last Name','Email','Phone','Interest','Status','Message','Date'];
  const lines  = [header, ...rows.map(r => [r.id, r.first_name, r.last_name, r.email, r.phone, r.interest, r.status, r.message||'', r.created_at].map(v => `"${String(v).replace(/"/g,'""')}"`))];
  const csv = lines.map(l => l.join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `brightpath-enquiries-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function interestLabel(v) {
  return v === 'become' ? 'Become Carer' : v === 'transfer' ? 'Transfer' : 'Learn More';
}
function fmtDate(d) {
  return new Date(d).toLocaleString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
