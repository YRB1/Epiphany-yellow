<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Carer Portal — Epiphany Foster Care</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--purple:#78350F;--purple-d:#431407;--gold:#F59E0B;--teal:#0F766E;--coral:#E85D4A;--cream:#FFFBEB;--bg:#F5F4FA;}
#cursor{position:fixed;pointer-events:none;z-index:100000;width:40px;height:40px;border-radius:50%;border:1.5px solid rgba(245,158,11,.65);transform:translate(-50%,-50%);transition:width .25s,height .25s,border-color .25s,background .25s;will-change:left,top;mix-blend-mode:difference}
#cursor-dot{position:fixed;pointer-events:none;z-index:100001;width:5px;height:5px;border-radius:50%;background:var(--gold);transform:translate(-50%,-50%);will-change:left,top}
body.cursor-link #cursor{width:52px;height:52px;background:rgba(245,158,11,.14);border-color:rgba(245,158,11,.9)}
@media(hover:none){#cursor,#cursor-dot{display:none}body{cursor:auto}}
@media(hover:hover){body{cursor:none}a,button,[role=button]{cursor:none}}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;color:#1f2937;background:var(--bg)}
a{color:inherit;text-decoration:none}
.serif{font-family:'Playfair Display',serif}
.app{display:flex;min-height:100vh}

/* ── Sidebar ─────────────────────────── */
.sidebar{width:240px;background:var(--purple-d);color:#fff;position:fixed;top:0;bottom:0;left:0;display:flex;flex-direction:column;z-index:40;overflow-y:auto;transition:transform .25s}
.sb-logo{display:flex;align-items:center;gap:.6rem;padding:1.2rem 1.3rem;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo .star{width:36px;height:36px;border-radius:9px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;flex:none}
.sb-logo .ln{font-weight:700;font-size:.88rem;line-height:1.2}
.sb-logo .ls{font-size:.62rem;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.8px}

.sb-carer{padding:1rem 1.1rem;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:.7rem}
.sb-carer .ava{width:44px;height:44px;border-radius:50%;background:var(--gold);color:var(--purple-d);font-weight:700;font-size:1rem;display:flex;align-items:center;justify-content:center;overflow:hidden;flex:none;border:2px solid rgba(245,158,11,.4)}
.sb-carer .ava img{width:100%;height:100%;object-fit:cover}
.sb-carer .cn{font-weight:600;font-size:.84rem;line-height:1.25}
.sb-carer .cr{font-size:.68rem;color:rgba(255,255,255,.5)}
.sb-carer .cs{display:inline-flex;align-items:center;font-size:.62rem;font-weight:700;padding:.15rem .45rem;border-radius:30px;margin-top:.25rem}
.cs-active{background:rgba(42,157,143,.25);color:#6ee7b7}
.cs-assessment{background:rgba(245,158,11,.2);color:#fcd34d}
.cs-leave{background:rgba(232,93,74,.2);color:#fca5a5}

.sb-nav{flex:1;padding:.75rem .6rem}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.65rem .8rem;border-radius:9px;cursor:pointer;color:rgba(255,255,255,.65);font-weight:500;font-size:.88rem;margin-bottom:.15rem;transition:.15s;position:relative}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:linear-gradient(90deg,rgba(245,158,11,.2),rgba(245,158,11,.04));color:#fff}
.nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;border-radius:3px;background:var(--gold)}
.nav-item svg{width:17px;height:17px;flex:none}

.sb-emergency{margin:.75rem .6rem;background:rgba(232,93,74,.15);border:1px solid rgba(232,93,74,.3);border-radius:10px;padding:.85rem .9rem}
.sb-emergency .se-title{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.55);margin-bottom:.4rem}
.sb-emergency a{display:flex;align-items:center;gap:.45rem;color:#fca5a5;font-weight:700;font-size:.8rem;margin-bottom:.2rem}
.sb-emergency a:last-child{margin-bottom:0}

.sb-logout{margin:.5rem .6rem 1rem;display:flex;align-items:center;gap:.5rem;color:rgba(255,255,255,.4);font-size:.78rem;cursor:pointer;padding:.5rem .7rem;border-radius:8px;transition:.15s}
.sb-logout:hover{color:var(--coral);background:rgba(232,93,74,.08)}

/* ── Main ───────────────────────────── */
.main{flex:1;margin-left:240px;display:flex;flex-direction:column;min-width:0}
.topbar{height:60px;background:#fff;border-bottom:1px solid #ece9f4;position:sticky;top:0;z-index:30;display:flex;align-items:center;padding:0 1.5rem;gap:1rem}
.topbar h1{font-size:1.1rem;font-weight:700;color:var(--purple-d)}
.topbar .tb-right{margin-left:auto;display:flex;align-items:center;gap:.85rem}
.topdate{font-size:.78rem;color:#9ca3af}
.tb-ssw{display:flex;align-items:center;gap:.5rem;background:var(--cream);padding:.35rem .7rem;border-radius:30px;font-size:.78rem;font-weight:600;color:var(--purple);cursor:pointer}
.tb-ssw img{width:26px;height:26px;border-radius:50%;object-fit:cover}

.content{padding:24px;flex:1}
.panel{display:none}
.panel.active{display:block;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ── Cards ──────────────────────────── */
.card{background:#fff;border:1px solid #ece9f4;border-radius:14px;box-shadow:0 2px 8px rgba(26,15,64,.04)}
.pcard{padding:1.2rem}
.section-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.section-h h2{font-size:1rem;font-weight:700;color:var(--purple-d)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}

/* Stat cards */
.stat-card{background:#fff;border:1px solid #ece9f4;border-radius:14px;padding:1.2rem;box-shadow:0 2px 8px rgba(26,15,64,.04)}
.stat-label{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:#9ca3af;margin-bottom:.35rem}
.stat-val{font-size:2rem;font-weight:700;color:var(--purple-d);line-height:1;font-family:'Playfair Display',serif}
.stat-sub{font-size:.75rem;color:#9ca3af;margin-top:.25rem}
.stat-icon{float:right;width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center}

/* Badges & tags */
.badge{display:inline-flex;align-items:center;padding:.22rem .65rem;border-radius:30px;font-size:.7rem;font-weight:700;color:#fff}
.tag{display:inline-flex;padding:.2rem .5rem;border-radius:7px;font-size:.68rem;font-weight:600;color:#fff;margin:.1rem}
.status-pill{display:inline-flex;align-items:center;gap:.3rem;padding:.22rem .65rem;border-radius:30px;font-size:.72rem;font-weight:700}
.status-pill::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor}
.sp-active{background:#dcfce7;color:#15803d}
.sp-upcoming{background:#dbeafe;color:#1d4ed8}
.sp-completed{background:#f0fdf4;color:#166534}
.sp-overdue{background:#fef2f2;color:#b91c1c}

/* Table */
table{width:100%;border-collapse:collapse;font-size:.86rem}
th{background:#f8f7fc;color:#374151;font-weight:600;padding:.7rem 1rem;text-align:left;font-size:.78rem;border-bottom:1px solid #ece9f4}
td{padding:.75rem 1rem;border-bottom:1px solid #f5f4f9;vertical-align:middle}
tr:last-child td{border-bottom:none}

/* Timeline */
.timeline{display:flex;flex-direction:column;gap:.75rem}
.tl-item{display:flex;gap:1rem;align-items:flex-start}
.tl-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;margin-top:.15rem}
.tl-dot svg{width:15px;height:15px}
.tl-body{flex:1}
.tl-title{font-weight:600;font-size:.9rem;color:#1f2937}
.tl-sub{font-size:.78rem;color:#9ca3af;margin-top:.1rem}
.tl-date{font-size:.75rem;font-weight:600;color:var(--purple);margin-top:.25rem}

/* Progress bar */
.progress-wrap{background:#f0eef8;border-radius:99px;height:7px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--purple),var(--teal));transition:width .5s ease}

/* Training badge */
.training-badge{display:inline-flex;align-items:center;gap:.35rem;padding:.3rem .75rem;border-radius:30px;font-size:.72rem;font-weight:700}
.tb-done{background:#dcfce7;color:#15803d}
.tb-upcoming{background:#dbeafe;color:#1d4ed8}
.tb-required{background:#fef3c7;color:#b45309}

/* Allowance card */
.allowance-total{background:linear-gradient(135deg,var(--purple-d),var(--purple));color:#fff;border-radius:14px;padding:1.75rem;margin-bottom:1rem}
.at-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.55);margin-bottom:.5rem}
.at-amount{font-family:'Playfair Display',serif;font-size:3rem;font-weight:700;color:#fff;line-height:1}
.at-period{color:rgba(255,255,255,.55);font-size:.85rem;margin-top:.25rem}
.at-badges{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1.1rem}
.at-badge{background:rgba(255,255,255,.12);color:rgba(255,255,255,.8);font-size:.7rem;font-weight:600;padding:.25rem .65rem;border-radius:30px}

/* Doc list */
.doc-item{display:flex;align-items:center;gap:.85rem;padding:.85rem 1rem;border-bottom:1px solid #f5f4f9;cursor:pointer;transition:.15s}
.doc-item:last-child{border-bottom:none}
.doc-item:hover{background:#f8f7fc}
.doc-icon{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex:none}
.doc-name{font-weight:600;font-size:.86rem;color:#1f2937}
.doc-sub{font-size:.74rem;color:#9ca3af;margin-top:.1rem}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(15,10,40,.55);z-index:200;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:.2s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal-box{background:#fff;border-radius:18px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 40px 80px rgba(26,15,64,.22)}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:1.3rem 1.5rem;border-bottom:1px solid #ece9f4;position:sticky;top:0;background:#fff;z-index:1}
.modal-h h3{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--purple-d)}
.modal-b{padding:1.5rem}
.close-x{background:none;border:none;cursor:pointer;color:#9ca3af;padding:.2rem;display:flex;border-radius:6px}
.close-x:hover{color:var(--coral);background:#fef2f2}

/* Welcome banner */
.welcome-banner{background:linear-gradient(135deg,var(--purple-d) 0%,var(--purple) 60%,#3d2a8a 100%);border-radius:18px;padding:2rem 2.25rem;color:#fff;position:relative;overflow:hidden;margin-bottom:1.4rem}
.welcome-banner::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(245,158,11,.2),transparent 70%)}
.welcome-banner::after{content:'';position:absolute;bottom:-80px;left:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(42,157,143,.15),transparent 70%)}
.wb-inner{position:relative;z-index:1}
.wb-greeting{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:700;margin-bottom:.35rem}
.wb-sub{color:rgba(255,255,255,.65);font-size:.9rem;line-height:1.6;max-width:460px}
.wb-pills{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1.1rem}
.wb-pill{background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);font-size:.75rem;font-weight:600;padding:.3rem .75rem;border-radius:30px;display:flex;align-items:center;gap:.35rem}

/* Quick contact */
.ssw-card{background:linear-gradient(135deg,var(--teal),#0D9488);border-radius:14px;padding:1.25rem;color:#fff}
.ssw-card h3{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,.6);margin-bottom:.75rem}
.ssw-inner{display:flex;align-items:center;gap:.85rem}
.ssw-inner img{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,.3)}
.ssw-name{font-weight:700;font-size:.98rem}
.ssw-role{font-size:.72rem;color:rgba(255,255,255,.65);margin-bottom:.5rem}
.ssw-btns{display:flex;gap:.5rem;flex-wrap:wrap}
.ssw-btn{display:inline-flex;align-items:center;gap:.35rem;background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:8px;padding:.4rem .8rem;font-size:.78rem;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none;transition:.15s}
.ssw-btn:hover{background:rgba(255,255,255,.25)}

/* Next visit countdown */
.visit-card{background:linear-gradient(135deg,var(--gold),#D97706);border-radius:14px;padding:1.25rem;color:var(--purple-d)}
.visit-card h3{font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:rgba(120,53,15,.6);margin-bottom:.5rem}
.visit-days{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:700;line-height:1;color:var(--purple-d)}
.visit-label{font-size:.85rem;font-weight:600;margin-top:.15rem;color:var(--purple-d)}
.visit-date{font-size:.78rem;color:rgba(120,53,15,.65);margin-top:.15rem}

/* Responsive */
.hamb{display:none;background:none;border:none;cursor:pointer;padding:.3rem}
@media(max-width:900px){
  .main{margin-left:0}
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:none}
  .hamb{display:flex}
  .grid2,.grid3{grid-template-columns:1fr}
}
@media(max-width:600px){
  .content{padding:16px}
  .topbar{padding:0 1rem}
  .welcome-banner{padding:1.5rem}
  .wb-greeting{font-size:1.5rem}
  .at-amount{font-size:2.2rem}
}

/* Utility */
.inp{width:100%;padding:.7rem .9rem;border:1.5px solid #e5e7eb;border-radius:10px;font-size:.9rem;font-family:inherit;transition:.2s;background:#fafaf9}
.inp:focus{outline:none;border-color:var(--purple);background:#fff;box-shadow:0 0 0 3px rgba(120,53,15,.08)}
.fl{margin-bottom:1rem}
.fl label{display:block;font-size:.8rem;font-weight:600;color:#374151;margin-bottom:.35rem}
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.6rem 1rem;border-radius:9px;border:none;cursor:pointer;font-family:inherit;font-weight:600;font-size:.84rem;transition:.15s}
.btn-primary{background:var(--purple);color:#fff}
.btn-primary:hover{background:var(--purple-d)}
.btn-gold{background:var(--gold);color:var(--purple-d)}
.btn-gold:hover{background:#D97706}
.btn-ghost{background:#f5f4f9;color:var(--purple-d)}
.btn-ghost:hover{background:#ece9f4}
.btn-sm{padding:.45rem .75rem;font-size:.78rem}
.empty-state{text-align:center;padding:3rem 1.5rem;color:#9ca3af;font-size:.9rem}
.empty-state svg{width:48px;height:48px;margin:0 auto .75rem;display:block;stroke:#d1d5db;stroke-width:1.5}
.chips{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.chip{padding:.38rem .85rem;border-radius:30px;font-size:.8rem;font-weight:600;cursor:pointer;background:#f0eef8;color:var(--purple);transition:.15s;border:1.5px solid transparent}
.chip.on,.chip:hover{background:var(--purple);color:#fff}
</style>
</head>
<body>
<div id="cursor"></div><div id="cursor-dot"></div>
<div class="app">

<!-- ── SIDEBAR ───────────────────────────── -->
<aside class="sidebar" id="sidebar">
  <div class="sb-logo">
    <div class="star">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5Z" fill="#F59E0B"/></svg>
    </div>
    <div>
      <div class="ln">Epiphany Foster Care</div>
      <div class="ls">Carer Portal</div>
    </div>
  </div>

  <!-- Carer info -->
  <div class="sb-carer" id="sbCarer">
    <div class="ava" id="sbAva"></div>
    <div>
      <div class="cn" id="sbName"></div>
      <div class="cr" id="sbRole"></div>
      <div id="sbStatus"></div>
    </div>
  </div>

  <nav class="sb-nav" id="sbNav">
    <div class="nav-item active" data-panel="overview">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Overview
    </div>
    <div class="nav-item" data-panel="profile">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      My Profile
    </div>
    <div class="nav-item" data-panel="placements">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      My Placements
    </div>
    <div class="nav-item" data-panel="meetings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Meetings &amp; Visits
    </div>
    <div class="nav-item" data-panel="training">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg>
      My Training
    </div>
    <div class="nav-item" data-panel="allowances">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      Allowances
    </div>
    <div class="nav-item" data-panel="documents">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Documents
    </div>
    <div class="nav-item" data-panel="contact">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.1 1.22 2 2 0 012.11 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.09a16 16 0 006 6l.46-.46a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      Contact
    </div>
  </nav>

  <div class="sb-emergency">
    <div class="se-title">Emergency Numbers</div>
    <a href="tel:08001234568"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.1 1.22 2 2 0 012.11 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.09a16 16 0 006 6l.46-.46a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg> 0800 123 4568 (24/7)</a>
    <a href="tel:08001234567"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.1 1.22 2 2 0 012.11 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.09a16 16 0 006 6l.46-.46a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg> 0800 123 4567 (Office)</a>
  </div>

  <div class="sb-logout" id="logoutBtn">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    Sign out
  </div>
</aside>

<!-- ── MAIN ──────────────────────────────── -->

let CARER = null;
const _carerId = sessionStorage.getItem('efc_carer_id');
if (_carerId) {
  CARER = CARER_USERS.find(c => c.id === _carerId) || null;
}
if (!CARER) { window.location.href = 'login.html'; }

/* ══════════════════════════════════════════
   UTILITIES
══════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function fmtDate(d){ if(!d)return '—'; return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}); }
function fmtDay(d){ return new Date(d).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long'}); }
function daysUntil(d){ return Math.ceil((new Date(d)-new Date())/(1000*60*60*24)); }
function greeting(){ const h=new Date().getHours(); return h<12?'Good morning':h<17?'Good afternoon':'Good evening'; }
function initials(n){ return n.split(' ').map(w=>w[0]).filter(Boolean).slice(0,2).join('').toUpperCase(); }

/* ══════════════════════════════════════════
   BOOTSTRAP
══════════════════════════════════════════ */
function boot() {
  // Topbar date
  $('topDate').textContent = new Date().toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  // Sidebar carer info
  $('sbAva').innerHTML = `<img src="${CARER.photo}" onerror="this.outerHTML='<span>${initials(CARER.name)}</span>'" alt="${CARER.name}">`;
  $('sbName').textContent = CARER.firstName;
  $('sbRole').textContent = CARER.approvalTypes.join(' · ');
  const statusMap = {active:'cs-active',assessment:'cs-assessment',on_leave:'cs-leave'};
  const statusLabel = {active:'Active',assessment:'In Assessment',on_leave:'On Leave'};
  $('sbStatus').innerHTML = `<span class="cs ${statusMap[CARER.status]}">${statusLabel[CARER.status]}</span>`;

  // SSW chip
  $('sswChip').innerHTML = `<img src="${CARER.sswPhoto}" onerror="this.style.display='none'" style="width:22px;height:22px;border-radius:50%;object-fit:cover"> My SSW: ${CARER.sswName.split(' ')[0]}`;
  $('sswChip').addEventListener('click', () => navigate('contact'));

  // Nav
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => navigate(item.dataset.panel));
  });

  $('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem('efc_carer_id');
    window.location.href = 'login.html';
  });

  $('hamb').addEventListener('click', () => $('sidebar').classList.toggle('open'));
  document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
  $('modal').addEventListener('click', e => { if(e.target===$('modal')) closeModal(); });

  navigate('overview');
}

function navigate(panel) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector(`.nav-item[data-panel="${panel}"]`)?.classList.add('active');
  const titles = {overview:'Overview',profile:'My Profile',placements:'My Placements',meetings:'Meetings & Visits',training:'My Training',allowances:'Allowances',documents:'Documents',contact:'Contact'};
  $('panelTitle').textContent = titles[panel] || panel;
  $('panel-'+panel).classList.add('active');
  $('sidebar').classList.remove('open');
  RENDERS[panel]();
}

const RENDERS = {
  overview: renderOverview, profile: renderProfile, placements: renderPlacements,
  meetings: renderMeetings, training: renderTraining, allowances: renderAllowances,
  documents: renderDocuments, contact: renderContact
};

/* ══════════════════════════════════════════
   OVERVIEW
══════════════════════════════════════════ */
function renderOverview() {
  const c = CARER;
  const nextVisitDays = c.nextVisit ? daysUntil(c.nextVisit) : null;
  const completedTraining = c.training.filter(t=>t.status==='completed').length;
  const totalHours = c.training.filter(t=>t.status==='completed').reduce((s,t)=>s+t.hours,0);
  const currentPlacements = c.placements.filter(p=>!p.end).length;
  const upcomingMeetings = c.meetings.filter(m=>new Date(m.date)>=new Date()).sort((a,b)=>new Date(a.date)-new Date(b.date));

  let html = `<div class="welcome-banner">
    <div class="wb-inner">
      <div class="wb-greeting">${greeting()}, ${esc(c.firstName)}.</div>
      <div class="wb-sub">Welcome to your Epiphany Foster Care portal. Here you'll find everything you need about your placements, meetings, training, and allowances.</div>
      <div class="wb-pills">
        <span class="wb-pill"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>${c.status==='active'?'Active Carer':c.status==='assessment'?'In Assessment':'On Leave'}</span>
        ${c.approvalDate?`<span class="wb-pill">Approved: ${fmtDate(c.approvalDate)}</span>`:'<span class="wb-pill">Approval Pending</span>'}
        <span class="wb-pill">${c.approvalTypes.join(' · ')}</span>
      </div>
    </div>
  </div>`;

  // Stat row
  html += `<div class="grid3" style="margin-bottom:1.2rem">
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(120,53,15,.08);float:right"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#78350F" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></div>
      <div class="stat-label">Current Placements</div>
      <div class="stat-val">${currentPlacements}</div>
      <div class="stat-sub">${c.placements.length} total incl. past</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(245,158,11,.1);float:right"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
      <div class="stat-label">Upcoming Meetings</div>
      <div class="stat-val">${upcomingMeetings.length}</div>
      <div class="stat-sub">Next: ${upcomingMeetings.length?fmtDate(upcomingMeetings[0].date):'—'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon" style="background:rgba(42,157,143,.1);float:right"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0F766E" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg></div>
      <div class="stat-label">Training Completed</div>
      <div class="stat-val">${completedTraining}</div>
      <div class="stat-sub">${totalHours} hours total</div>
    </div>
  </div>`;

  // Next visit + SSW
  html += `<div class="grid2" style="margin-bottom:1.2rem">`;
  if (nextVisitDays !== null) {
    html += `<div class="visit-card">
      <h3>Next SSW Visit</h3>
      <div class="visit-days">${nextVisitDays<0?'Overdue':nextVisitDays===0?'Today':nextVisitDays}</div>
      <div class="visit-label">${nextVisitDays<0?'days overdue':nextVisitDays===0?'— today!':nextVisitDays===1?'day away':'days away'}</div>
      <div class="visit-date">${fmtDay(c.nextVisit)}</div>
    </div>`;
  } else { html += `<div class="card pcard" style="color:#9ca3af">No visit scheduled.</div>`; }
  html += `<div class="ssw-card">
    <h3>Your Supervising Social Worker</h3>
    <div class="ssw-inner">
      <img src="${esc(c.sswPhoto)}" alt="${esc(c.sswName)}">
      <div>
        <div class="ssw-name">${esc(c.sswName)}</div>
        <div class="ssw-role">Supervising Social Worker</div>
        <div class="ssw-btns">
          <a class="ssw-btn" href="tel:${c.sswPhone}"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.1 1.22 2 2 0 012.11 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.09a16 16 0 006 6l.46-.46a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg> Call</a>

   MEETINGS & VISITS

let mtgFilter = 'upcoming';
function renderMeetings() {
  const c = CARER;
  const now = new Date();
  const allMtgs = c.meetings.sort((a,b)=>new Date(a.date)-new Date(b.date));
  const filtered = mtgFilter==='upcoming'?allMtgs.filter(m=>new Date(m.date)>=now):mtgFilter==='past'?allMtgs.filter(m=>new Date(m.date)<now):allMtgs;
  const typeColors = {visit:'#0F766E',review:'#F59E0B',annual:'#78350F',panel:'#E85D4A',training:'#1d4ed8',meeting:'#6b7280'};
  const typeLabels = {visit:'SSW Visit',review:'Review',annual:'Annual Review',panel:'Panel',training:'Training',meeting:'Meeting'};

  let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem">
    <div class="chips" style="margin-bottom:0">
      ${[['upcoming','Upcoming'],['past','Past'],['all','All']].map(([v,l])=>`<div class="chip${mtgFilter===v?' on':''}" onclick="mtgFilter='${v}';renderMeetings()">${l}</div>`).join('')}
    </div>
  </div>`;

  if (!filtered.length) {
    html += `<div class="card empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/></svg>No ${mtgFilter} meetings.</div>`;
  } else {
    html += `<div class="${filtered.length>1?'grid2':''}">`;
    filtered.forEach(m => {
      const past = new Date(m.date) < now;
      const col = typeColors[m.type] || '#6b7280';
      html += `<div class="card pcard" style="border-top:3px solid ${col};cursor:pointer" onclick="openMeeting('${m.id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem">
          <h3 style="font-weight:700;font-size:.95rem;color:var(--purple-d)">${esc(m.title)}</h3>
          <span class="badge" style="background:${col}">${typeLabels[m.type]||m.type}</span>
        </div>
        <div style="display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:#6b7280;margin-bottom:.35rem">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          ${fmtDay(m.date)} at ${new Date(m.date).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}
        </div>
        <div style="display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:#6b7280;margin-bottom:.65rem">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ${esc(m.location)}
        </div>
        ${m.notes?`<div style="font-size:.8rem;color:#6b7280;background:var(--cream);border-radius:8px;padding:.6rem .75rem">${esc(m.notes)}</div>`:''}
        ${past?'<div style="margin-top:.6rem"><span class="status-pill" style="background:#f0fdf4;color:#166534">Completed</span></div>':''}
      </div>`;
    });
    html += '</div>';
  }
  $('panel-meetings').innerHTML = html;
}
function openMeeting(id) {
  const m = CARER.meetings.find(x=>x.id===id); if(!m) return;
  const typeColors = {visit:'#0F766E',review:'#F59E0B',annual:'#78350F',panel:'#E85D4A',training:'#1d4ed8',meeting:'#6b7280'};
  openModal(m.title,`
    <div style="margin-bottom:1rem;display:flex;gap:.5rem;flex-wrap:wrap">
      <span class="badge" style="background:${typeColors[m.type]||'#6b7280'}">${esc(m.type)}</span>
    </div>
    <div style="display:grid;gap:.6rem;margin-bottom:1.2rem">
      ${[['Date & Time',fmtDay(m.date)+' at '+new Date(m.date).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})],['Location',m.location]].map(([k,v])=>`<div style="display:flex;gap:1rem;padding:.65rem .9rem;background:var(--cream);border-radius:9px"><span style="font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;width:90px;flex:none">${k}</span><span style="font-size:.86rem;color:#1f2937">${esc(v)}</span></div>`).join('')}
    </div>
    ${m.notes?`<div style="background:#f0f9ff;border-left:3px solid #0F766E;padding:.9rem 1rem;border-radius:0 9px 9px 0;font-size:.86rem;color:#1f2937">${esc(m.notes)}</div>`:''}
  `, '<button class="btn btn-ghost" onclick="closeModal()">Close</button>');
}

/* ══════════════════════════════════════════
   TRAINING
══════════════════════════════════════════ */
function renderTraining() {
  const c = CARER;
  const completed = c.training.filter(t=>t.status==='completed');
  const upcoming = c.training.filter(t=>t.status==='upcoming');
  const totalHours = completed.reduce((s,t)=>s+t.hours,0);
  const pct = Math.min(100, Math.round(totalHours/40*100));

  let html = `<div class="grid2" style="margin-bottom:1.2rem">
    <div class="card pcard">
      <div class="stat-label">Training Hours Completed</div>
      <div class="stat-val">${totalHours}<span style="font-size:1rem;color:#9ca3af"> hrs</span></div>
      <div style="margin-top:.85rem"><div class="progress-wrap"><div class="progress-fill" style="width:${pct}%"></div></div><div style="display:flex;justify-content:space-between;font-size:.72rem;color:#9ca3af;margin-top:.3rem"><span>${totalHours} hrs completed</span><span>40 hrs annual target</span></div></div>
    </div>
    <div class="card pcard">
      <div class="stat-label">Certificates Earned</div>
      <div class="stat-val">${completed.filter(t=>t.cert).length}</div>
      <div class="stat-sub">${completed.length} courses completed total</div>
      ${upcoming.length?`<div style="margin-top:.75rem"><span class="training-badge tb-upcoming">${upcoming.length} upcoming</span></div>`:''}
    </div>
  </div>`;

  if (upcoming.length) {
    html += `<div class="card" style="margin-bottom:1.2rem;overflow:hidden">
      <div style="padding:1rem 1.2rem;border-bottom:1px solid #ece9f4"><h2 style="font-size:.95rem;font-weight:700;color:var(--purple-d)">Upcoming Training</h2></div>
      <table><thead><tr><th>Course</th><th>Provider</th><th>Date</th><th>Hours</th><th>Status</th></tr></thead><tbody>
      ${upcoming.map(t=>`<tr>
        <td><strong>${esc(t.title)}</strong></td>
        <td style="font-size:.82rem;color:#6b7280">${esc(t.provider)}</td>
        <td>${fmtDate(t.date)}</td>
        <td>${t.hours} hrs</td>
        <td><span class="training-badge tb-upcoming">Upcoming</span></td>
      </tr>`).join('')}
      </tbody></table>
    </div>`;
  }

  html += `<div class="card" style="overflow:hidden">
    <div style="padding:1rem 1.2rem;border-bottom:1px solid #ece9f4"><h2 style="font-size:.95rem;font-weight:700;color:var(--purple-d)">Completed Training</h2></div>
    ${completed.length?`<table><thead><tr><th>Course</th><th>Provider</th><th>Completed</th><th>Hours</th><th>Certificate</th></tr></thead><tbody>
    ${completed.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(t=>`<tr>
      <td><strong>${esc(t.title)}</strong></td>
      <td style="font-size:.82rem;color:#6b7280">${esc(t.provider)}</td>
      <td>${fmtDate(t.date)}</td>
      <td>${t.hours} hrs</td>
      <td>${t.cert?'<span class="training-badge tb-done">✓ Certified</span>':'<span style="color:#9ca3af;font-size:.78rem">—</span>'}</td>
    </tr>`).join('')}
    </tbody></table>`:'<div class="empty-state">No completed training yet.</div>'}
  </div>`;

  $('panel-training').innerHTML = html;
}

function openModal(title, body, footer) {
  $('modalBox').innerHTML = `<div class="modal-h"><h3>${esc(title)}</h3><button class="close-x" onclick="closeModal()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div class="modal-b">${body}</div>${footer?`<div style="padding:1rem 1.5rem;border-top:1px solid #ece9f4;display:flex;justify-content:flex-end;gap:.6rem">${footer}</div>`:'' }`;
  $('modal').classList.add('show');
}
function closeModal() { $('modal').classList.remove('show'); }

/* ── Custom cursor ── */
(function(){
  const c=document.getElementById('cursor'),d=document.getElementById('cursor-dot');
  if(!c||!window.matchMedia('(hover:hover)').matches)return;
  let mx=0,my=0,cx=0,cy=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
  (function tick(){cx+=(mx-cx)*.12;cy+=(my-cy)*.12;c.style.left=cx+'px';c.style.top=cy+'px';d.style.left=mx+'px';d.style.top=my+'px';requestAnimationFrame(tick);})();
  document.querySelectorAll('a,button,[role=button],.nav-item,.pg-item').forEach(el=>{
    el.addEventListener('mouseenter',()=>document.body.classList.add('cursor-link'));
    el.addEventListener('mouseleave',()=>document.body.classList.remove('cursor-link'));
  });
})();
/* ── Boot ── */
boot();
